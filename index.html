<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/login.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="auth-layout">
        <div class="auth-banner">
            <img class="auth-banner__image" src="/image/banner-login.png" alt="banner-login">
        </div>

        <div class="auth-content">
            <div class="auth-logo">
                <img class="auth-logo__image" src="/image/logo.png" alt="logo">
            </div>

            <h2 class="auth-title">Đăng nhập hệ thống</h2>

            <p class="auth-description">
                Chào mừng bạn đến với Hệ thống số hóa Quy Trình Đặt hàng & Tồn kho
            </p>

            <form id="auth-form">
                <div class="form-group">
                    <label class="form-label" for="username">
                        Tên đăng nhập(Email/Mã NV)
                    </label>
                    <div class="input-wrapper">
                        <i class="ri-user-line icon-left"></i>
                        <input class="form-input" type="text" id="username" name="username"
                            placeholder="Nhập mã NV hoặc email công ty">
                            
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        Mật khẩu
                    </label>
                    <div class="input-wrapper">
                        <i class="ri-lock-line icon-left"></i>
                        <input class="form-input" type="password" id="password" name="password" placeholder="Nhập mật khẩu">
                        <i class="ri-eye-off-line icon-right"></i>
                    </div>
                </div>
                <button id="btn-login" type="submit">
                    Đăng nhập
                </button>
                <span class="auth-message"></span>
            </form>
        </div>
    </div>
    <script src="scripts/mock-data.js"></script>
    <script type="module" src="/scripts/login.js"></script>
</body>

</html>
