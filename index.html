<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="styles/main.css">
    
</head>
<body>
    <div class="auth-layout">
    <div class="auth-banner">
        <img class="auth-banner__image" src="/image/banner-login.png" alt="banner-login">
    </div>

    <div class="auth-content">
        <div class="auth-logo">
            <img class="auth-logo__image" src="/image/logo.png" alt="logo">
        </div>

        <h2 class="auth-title">Đăng nhập hệ thống</h2>

        <p class="auth-description">
            Chào mừng bạn đến với Hệ thống số hóa Quy Trình Đặt hàng & Tồn kho Nội bộ,
            Vui lòng nhập thông tin để tiếp tục
        </p>

        <form class="auth-form">
            <div class="form-group">
                <label class="form-label" for="username">
                    Tên đăng nhập(Emai/Mã NV)
                </label>

                <input
                    class="form-input"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Tên đăng nhập / Email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">
                    Mật khẩu
                </label>

                <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Nhập mật khẩu"
                >
            </div>

            <button class="btn-login" type="submit">
                Đăng nhập
            </button>
        </form>
    </div>
</div>
</body>
</html>
